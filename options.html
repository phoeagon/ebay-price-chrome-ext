<!DOCTYPE html>
<html>

<head>
    <title>eBay Total Price Settings</title>
    <link rel="stylesheet" href="options.css">
</head>

<body>
    <div class="container">
        <h1>eBay Total Price Settings</h1>
        <div class="section">
            <label for="zipCode">Location (Zip Code):</label>
            <input type="text" id="zipCode" placeholder="95050">
            <p class="hint">Default is Santa Clara (95050).</p>
        </div>
        <div class="section">
            <label for="taxRate">Estimated Tax Rate (%):</label>
            <input type="number" id="taxRate" step="0.01" placeholder="9.25">
            <p class="hint">Enter local sales tax rate for your location.</p>
        </div>
        <div class="section checkbox-section">
            <input type="checkbox" id="greyOutPrice" checked>
            <label for="greyOutPrice">Grey out original price</label>
        </div>
        <button id="save">Save Settings</button>
        <div id="status"></div>
    </div>
    <script src="options.js"></script>
</body>

</html>
